<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bibbles & Bubbles</title>
    <style>

      @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');

      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #000;
        color: #fff;
        font-family: Arial, sans-serif;
      }

      main {
        width: min(92vw, 900px);
        padding: 40px 0;
      }

      .hero-image {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        object-fit: cover;
        border-radius: 18px;
        background: #171717;
      }

      .moons-image {
        display: block;
        width: 100%;
        height: 12rem;
        object-fit: contain;
        border-radius: 18px;
        margin-bottom: 5rem;
      }

      .spotify-player {
        min-height: 152px;
        margin-top: 24px;
        padding: 20px;
        border: 1px dashed #4a4a4a;
        border-radius: 14px;
        background: #121212;
      }

      #title {
        margin: 0 0 24px;
        font-size: 2.5rem;
        font-weight: bold;
        text-align: center;
        color: #fff;

        font-family: "Luckiest Guy", cursive;
        font-weight: 400;
        font-style: normal;

        background: #FFFFFF;
        background: linear-gradient(to bottom, #FFFFFF 0%, #c8c8c8 15%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

          #counter {
        font-size: 2rem;
        text-align: center;
    }

    .label {
        font-size: 1rem;
        color: #aaa;
        margin-bottom: 12px;
    }

    </style>
  </head>
  <body>
    <main>

<img
        class="moons-image"
        src="../img/moons.jpg"
        alt="Under the Light of three Moons"
      />

      <h1 id="title">Bibbles & Bubbles</h1>
      <!-- Replace the image URL with your own image. -->
      <img
        class="hero-image"
        src="../img/hero-2.jpg"
        alt="Bibbles & Bubbles"
      />

      <!-- Paste your Spotify embed iframe inside this div. -->
      <div class="spotify-player" id="spotify-player">
        <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/track/79BY6QNQu7FeL6DnaKu5wT?utm_source=generator&theme=0&si=c420b5c36e89492c" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>

      </div>

      <div>
    <div class="label">Time since June 6, 2026</div>
    <div id="counter"></div>
</div>

<script>
const startDate = new Date("2026-06-06T00:00:00");

function updateCounter() {
    const now = new Date();
    let diff = now - startDate;

    if (diff < 0) {
        document.getElementById("counter").textContent = "Not started yet";
        return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    diff %= 1000 * 60 * 60 * 24;

    const hours = Math.floor(diff / (1000 * 60 * 60));
    diff %= 1000 * 60 * 60;

    const minutes = Math.floor(diff / (1000 * 60));
    diff %= 1000 * 60;

    const seconds = Math.floor(diff / 1000);

    document.getElementById("counter").textContent =
        `${days}d ${hours.toString().padStart(2, "0")}h ` +
        `${minutes.toString().padStart(2, "0")}m ` +
        `${seconds.toString().padStart(2, "0")}s`;
}

updateCounter();
setInterval(updateCounter, 1000);
</script>
    </main>
  </body>
</html>
