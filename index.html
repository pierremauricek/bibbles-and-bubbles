<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bibbles & Bubbles</title>
    <style>

      @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');

      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #000;
        color: #fff;
        font-family: Arial, sans-serif;
      }

      main {
        width: min(92vw, 900px);
        padding: 40px 0;
      }

      .hero-image {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        object-fit: cover;
        border-radius: 18px;
        background: #171717;
      }

      .spotify-player {
        min-height: 152px;
        margin-top: 24px;
        padding: 20px;
        border: 1px dashed #4a4a4a;
        border-radius: 14px;
        background: #121212;
      }

      #title {
        margin: 0 0 24px;
        font-size: 2.5rem;
        font-weight: bold;
        text-align: center;
        color: #fff;

        font-family: "Luckiest Guy", cursive;
        font-weight: 400;
        font-style: normal;
      }

    </style>
  </head>
  <body>
    <main>

      <h1 id="title">Bibbles & Bubbles</h1>
      <!-- Replace the image URL with your own image. -->
      <img
        class="hero-image"
        src="../img/hero-2.jpg"
        alt="Ocean waves"
      />

      <!-- Paste your Spotify embed iframe inside this div. -->
      <div class="spotify-player" id="spotify-player">
        <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/track/79BY6QNQu7FeL6DnaKu5wT?utm_source=generator&theme=0&si=c420b5c36e89492c" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>

      </div>
    </main>
  </body>
</html>
