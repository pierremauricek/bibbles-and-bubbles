<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
<title>Quiz Question</title>
<style>
body {
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 16px;
    min-height: 100vh;
    margin: 0;
    padding: 16px;
    background: black;
    box-sizing: border-box;
}

.tour-image {
    width: 100%;
    max-width: 520px;
    margin: 0 auto;
}

.tour-image img {
    width: 70%;
    height: auto;
    display: block;
    margin: 0 auto;
    object-fit: cover;
}

.quiz {
   color: white;
    padding: 24px;
    border-radius: 20px;
    width: 90vw;
    min-height: 70vh;
    max-width: none;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.quiz-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}



.actions {
    margin-top: auto;
    display: flex;
    gap: 12px;
    align-items: stretch;
}

.next-button {
    background-color: white;
    color: black;
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 48px;
    height: 100%;
    flex: 1;
}




@media (min-width: 768px) {
    .quiz {
        width: 50vw;
        min-height: 20vh;
        max-width: none;
    }
}

</style>
</head>
<body>

<div class="tour-image">
    <img src="../img/bibbles-and-bubbles-tour.png" alt="Tour Image">
</div>

<div class="quiz">

    <div class="quiz-content">
        <h2>Sorry, I lied to you :(</h2>
        <img src="../img/sad.jpeg" alt="Sad Smiley" style="width: 50%; height: auto; border-radius: 20px;">
        <br>
        <h2>There is no real Taylor Swift in this Birthday Tour...</h2>
        <br>
        <h2>But here is a little something for you...</h2>
        <br>
    </div>
    
   

    <div class="actions">
        <button class="next-button" onclick="checkAnswer()">Next</button>
    </div>

    
</div>

<script>
const answer = "alison";
const correctAnswer = "alison";
const nextPage = "/secret-levels/sorry.html";

function checkAnswer() {
    const answer = document
        .getElementById("answer")
        .value
        .trim()
        .toLowerCase();

    if (answer === correctAnswer) {
        window.location.href = nextPage;
    } else {
        document.getElementById("message").textContent =
            "Very Bad Girl! Please try again.";
    }
}

function showHint() {
    document.getElementById("message").textContent =
        "It starts with an 'A' like 'Anal' and ends with a 'N' like 'Nonrepresentationalism'.";
}

document.getElementById("answer").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        checkAnswer();
    }
});
</script>

</body>
</html>
