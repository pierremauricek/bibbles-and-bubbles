<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz Question</title>
<style>
body {
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 16px;
    background: black;
    box-sizing: border-box;
}

.quiz {
    background: white;
    padding: 24px;
    border-radius: 20px;
    width: 90vw;
    min-height: 50vh;
    max-width: none;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

input {
    width: 100%;
    height: 60px;
    padding: 10px;
    margin: 20px 0;
    box-sizing: border-box;
    position: relative;
    bottom: 20px;
}

#message {
    text-align: center;
    text-justify: center;
    font-size: 1.2rem;
    font-weight: bold;
    color: red;
    display: block;
    position: relative;
    top: 5rem;
}

.actions {
    margin-top: auto;
    display: flex;
    gap: 12px;
    align-items: stretch;
}

.next-button,
.hint-button {
    background-color: rgb(200, 200, 200);
    color: black;
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 48px;
    height: 100%;
    flex: 1;
   
}


@media (min-width: 768px) {
    .quiz {
        width: 50vw;
        min-height: 20vh;
        max-width: none;
    }
}

</style>
</head>
<body>

<div class="quiz">
    <h2>This is a secret birthday game. Do you want to play? Type 'Yes' to continue.</h2>

    <input
        id="answer"
        type="text"
        placeholder="Your answer..."
        autocomplete="off"
    >

    <div class="actions">
        <button class="next-button" onclick="checkAnswer()">Next</button>
        <button class="hint-button" onclick="showHint()">Hint</button>
    </div>

    <p id="message"></p>
</div>

<script>
const correctAnswer = "yes";
const nextPage = "/secret-levels/yes.html";

function checkAnswer() {
    const answer = document
        .getElementById("answer")
        .value
        .trim()
        .toLowerCase();

    if (answer === correctAnswer) {
        window.location.href = nextPage;
    } else {
        document.getElementById("message").textContent =
            "Bad Girl! Please try again.";
    }
}

function showHint() {
    document.getElementById("message").textContent =
        "It's a simple 'yes' or 'no' question.";
}

document.getElementById("answer").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        checkAnswer();
    }
});
</script>

</body>
</html>
