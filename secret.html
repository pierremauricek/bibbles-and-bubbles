<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz Question</title>
<style>
body {
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 16px;
    background: black;
    box-sizing: border-box;
}

.quiz {
    background: white;
    padding: 24px;
    border-radius: 10px;
    width: 100%;
    max-width: 520px;
    box-sizing: border-box;
}

input {
    width: 100%;
    padding: 10px;
    margin: 20px 0;
    box-sizing: border-box;
}

#message {
    color: red;
}

.game-button {
    background-color: rgb(200, 200, 200);
    color: black;
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

@media (min-width: 768px) {
    .quiz {
        width: 80vw;
        min-height: 50vh;
        max-width: none;
    }
}

</style>
</head>
<body>

<div class="quiz">
    <h2>This is a secret birthday game. Do you want to play? Type 'Yes' to continue.</h2>

    <input
        id="answer"
        type="text"
        placeholder="Your answer..."
        autocomplete="off"
    >

    <button class="game-button" onclick="checkAnswer()">Next</button>

    <p id="message"></p>
</div>

<script>
const correctAnswer = "yes";
const nextPage = "/secret-levels/yes.html";

function checkAnswer() {
    const answer = document
        .getElementById("answer")
        .value
        .trim()
        .toLowerCase();

    if (answer === correctAnswer) {
        window.location.href = nextPage;
    } else {
        document.getElementById("message").textContent =
            "Bad Girl! Please try again.";
    }
}

document.getElementById("answer").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        checkAnswer();
    }
});
</script>

</body>
</html>
